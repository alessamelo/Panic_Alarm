<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks | StudyOS</title>

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="../global.css">
</head>
<body>

  <div class="page-container">

    <h1>Daily Tasks + Subjects ✿</h1>

    <!-- ===================================== -->
    <!-- GLOBAL SAFETY BAR -->
    <!-- ===================================== -->

    <div class="global-safety-bar">

      <!-- GLOBAL TIMER -->
      <div class="retro-timer" id="timerDisplay">
        15:00
      </div>

      <!-- GLOBAL HELP BUTTON -->
      <button
        class="global-help-btn"
        onclick="manualEmergencyTrigger()"
      >
        HELP
      </button>

    </div>

    <!-- ===================================== -->
    <!-- MAIN 3 COLUMNS -->
    <!-- ===================================== -->

    <div class="three-columns">

      <!-- COLUMN 1 : DAILY HOME TASKS -->
      <section class="task-box">
        <h2>Daily Home Tasks</h2>

        <div id="dailyTasks"></div>
      </section>

      <!-- COLUMN 2 : UNIVERSITY TASKS -->
      <section class="task-box">
        <h2>University Tasks</h2>

        <input
          type="text"
          id="newSubjectInput"
          placeholder="Add new subject..."
        />

        <button
          class="pixel-btn"
          onclick="addSubject()"
        >
          + Subject
        </button>

        <input
          type="text"
          id="universityTaskInput"
          placeholder="Add university task..."
        />

        <select id="subjectSelect"></select>

        <button
          class="pixel-btn"
          onclick="addUniversityTask()"
        >
          Add Task
        </button>

        <ul id="universityTaskList"></ul>
      </section>

      <!-- COLUMN 3 : INVESTIGATION TASKS -->
      <section class="task-box">
        <h2>Investigation Tasks</h2>

        <input
          type="text"
          id="investigationTaskInput"
          placeholder="Add investigation task..."
        />

        <select id="projectSelect">
          <option>EEG Cage Prediction</option>
          <option>DepaYT Research</option>
        </select>

        <button
          class="pixel-btn"
          onclick="addInvestigationTask()"
        >
          Add Task
        </button>

        <ul id="investigationTaskList"></ul>
      </section>

    </div>

    <!-- BACK BUTTON -->
    <a href="../index.html" class="pixel-btn back-btn">
      Back
    </a>

  </div>

  <!-- ===================================== -->
  <!-- GLOBAL TIMER SYSTEM -->
  <!-- because index is outside Dashboard folder -->
  <!-- ===================================== -->

  <script src="../Emergency/globaltimer.js"></script>

  <script>
    /*
    =====================================
    DEFAULT DATA
    =====================================
    */

    const defaultSubjects = [
      "Neural Networks",
      "App Development",
      "Theory of Computation",
      "Software Engineering",
      "Natural Language Processing"
    ];

    const defaultDailyTasks = [
      "Make breakfast",
      "Make bed",
      "Shower",
      "Morning skincare",
      "Morning makeup",
      "Lunch + Wash dishes",
      "Remove makeup",
      "Night skincare",
      "Dinner + Wash dishes"
    ];

    /*
    =====================================
    PAGE LOAD
    =====================================
    */

    window.onload = function () {
      loadSubjects();
      loadDailyTasks();
      loadUniversityTasks();
      loadInvestigationTasks();
    };

    /*
    =====================================
    DAILY TASKS
    =====================================
    */

    function loadDailyTasks() {
      const container =
        document.getElementById("dailyTasks");

      container.innerHTML = "";

      let savedChecks =
        JSON.parse(localStorage.getItem("dailyTaskChecks")) || {};

      defaultDailyTasks.forEach((task, index) => {
        const checked =
          savedChecks[index] ? "checked" : "";

        const label =
          document.createElement("label");

        label.innerHTML = `
          <input
            type="checkbox"
            ${checked}
            onchange="saveDailyCheck(${index}, this.checked)"
          >
          ${task}
        `;

        container.appendChild(label);
      });
    }

    function saveDailyCheck(index, isChecked) {
      let savedChecks =
        JSON.parse(localStorage.getItem("dailyTaskChecks")) || {};

      savedChecks[index] = isChecked;

      localStorage.setItem(
        "dailyTaskChecks",
        JSON.stringify(savedChecks)
      );
    }

    /*
    =====================================
    SUBJECTS
    =====================================
    */

    function loadSubjects() {
      let savedSubjects =
        JSON.parse(localStorage.getItem("subjects"));

      if (!savedSubjects || savedSubjects.length === 0) {
        savedSubjects = defaultSubjects;

        localStorage.setItem(
          "subjects",
          JSON.stringify(savedSubjects)
        );
      }

      const select =
        document.getElementById("subjectSelect");

      select.innerHTML = "";

      savedSubjects.forEach(subject => {
        const option =
          document.createElement("option");

        option.value = subject;
        option.textContent = subject;

        select.appendChild(option);
      });
    }

    function addSubject() {
      const input =
        document.getElementById("newSubjectInput");

      const subjectName =
        input.value.trim();

      if (subjectName === "") return;

      let subjects =
        JSON.parse(localStorage.getItem("subjects")) || [];

      subjects.push(subjectName);

      localStorage.setItem(
        "subjects",
        JSON.stringify(subjects)
      );

      input.value = "";

      loadSubjects();
    }

    /*
    =====================================
    UNIVERSITY TASKS
    =====================================
    */

    function addUniversityTask() {
      const taskInput =
        document.getElementById("universityTaskInput");

      const subjectSelect =
        document.getElementById("subjectSelect");

      const taskName =
        taskInput.value.trim();

      const selectedSubject =
        subjectSelect.value;

      if (taskName === "") return;

      let tasks =
        JSON.parse(localStorage.getItem("universityTasks")) || [];

      tasks.push({
        subject: selectedSubject,
        task: taskName,
        completed: false
      });

      localStorage.setItem(
        "universityTasks",
        JSON.stringify(tasks)
      );

      taskInput.value = "";

      loadUniversityTasks();
    }

    function loadUniversityTasks() {
      const taskList =
        document.getElementById("universityTaskList");

      taskList.innerHTML = "";

      let tasks =
        JSON.parse(localStorage.getItem("universityTasks")) || [];

      tasks.forEach((item, index) => {
        const checked =
          item.completed ? "checked" : "";

        const li =
          document.createElement("li");

        li.innerHTML = `
          <label>
            <input
              type="checkbox"
              ${checked}
              onchange="toggleUniversityTask(${index}, this.checked)"
            >
            <strong>[${item.subject}]</strong>
            ${item.task}
          </label>
        `;

        taskList.appendChild(li);
      });
    }

    function toggleUniversityTask(index, isChecked) {
      let tasks =
        JSON.parse(localStorage.getItem("universityTasks")) || [];

      tasks[index].completed = isChecked;

      localStorage.setItem(
        "universityTasks",
        JSON.stringify(tasks)
      );
    }

    /*
    =====================================
    INVESTIGATION TASKS
    =====================================
    */

    function addInvestigationTask() {
      const taskInput =
        document.getElementById("investigationTaskInput");

      const projectSelect =
        document.getElementById("projectSelect");

      const taskName =
        taskInput.value.trim();

      const selectedProject =
        projectSelect.value;

      if (taskName === "") return;

      let tasks =
        JSON.parse(localStorage.getItem("investigationTasks")) || [];

      tasks.push({
        project: selectedProject,
        task: taskName,
        completed: false
      });

      localStorage.setItem(
        "investigationTasks",
        JSON.stringify(tasks)
      );

      taskInput.value = "";

      loadInvestigationTasks();
    }

    function loadInvestigationTasks() {
      const taskList =
        document.getElementById("investigationTaskList");

      taskList.innerHTML = "";

      let tasks =
        JSON.parse(localStorage.getItem("investigationTasks")) || [];

      tasks.forEach((item, index) => {
        const checked =
          item.completed ? "checked" : "";

        const li =
          document.createElement("li");

        li.innerHTML = `
          <label>
            <input
              type="checkbox"
              ${checked}
              onchange="toggleInvestigationTask(${index}, this.checked)"
            >
            <strong>[${item.project}]</strong>
            ${item.task}
          </label>
        `;

        taskList.appendChild(li);
      });
    }

    function toggleInvestigationTask(index, isChecked) {
      let tasks =
        JSON.parse(localStorage.getItem("investigationTasks")) || [];

      tasks[index].completed = isChecked;

      localStorage.setItem(
        "investigationTasks",
        JSON.stringify(tasks)
      );
    }
  </script>

</body>
</html>
